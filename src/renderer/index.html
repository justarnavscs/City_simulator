<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>City Simulator</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <h1>City Simulator</h1>
      <p>Disaster resilience, green-space optimization, farming suitability, and irrigation planning.</p>
    </header>

    <main>
      <section class="card controls">
        <h2>City Input</h2>
        <div class="grid">
          <label>City Name <input id="cityName" value="Bengaluru" /></label>
          <label>Latitude <input id="latitude" type="number" value="12.9716" step="0.0001" /></label>
          <label>Longitude <input id="longitude" type="number" value="77.5946" step="0.0001" /></label>
          <label>Population density / km² <input id="populationDensityPerKm2" type="number" value="12000" /></label>
          <label>Current green cover % <input id="currentGreenCoverPercent" type="number" value="11" /></label>
          <label>Soil quality index (0-100) <input id="soilQualityIndex" type="number" value="58" /></label>
          <label>Water stress index (0-100) <input id="waterStressIndex" type="number" value="70" /></label>
          <label>Seismic zone factor (1-5) <input id="seismicZoneFactor" type="number" value="2" min="1" max="5" /></label>
        </div>

        <h3>AI + API Settings</h3>
        <div class="grid">
          <label>Map Provider
            <select id="mapProvider">
              <option value="google">Google Maps</option>
              <option value="mappls">Mappls</option>
            </select>
          </label>
          <label>Google Maps API Key <input id="googleMapsApiKey" type="password" placeholder="Optional for map view" /></label>
          <label>Mappls API Key <input id="mapplsApiKey" type="password" placeholder="Optional for Mappls map view" /></label>
          <label>Gemini API Key <input id="geminiApiKey" type="password" placeholder="Required for Gemini mode" /></label>
          <label>AI Mode
            <select id="aiMode">
              <option value="gemini">Gemini</option>
              <option value="local">Local</option>
            </select>
          </label>
          <label>Model <input id="model" value="gemini-1.5-flash" /></label>
          <label>Cache TTL (minutes) <input id="cacheTtlMinutes" type="number" value="30" min="1" /></label>
        </div>

        <div class="actions">
          <button id="saveSettings">Save Settings</button>
          <button id="loadMap">Load Map</button>
          <button id="runAnalysis" class="primary">Run Analysis</button>
        </div>
        <p id="status"></p>
      </section>

      <section class="card">
        <h2>Map</h2>
        <div id="map"></div>
      </section>

      <section class="card">
        <h2>Resilience Report</h2>
        <pre id="reportOutput">Run analysis to generate report.</pre>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
